name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

permissions:
  contents: read

jobs:
  admin:
    name: Admin (build + lint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sellbotlk-admin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: sellbotlk-admin/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint

  api:
    name: API (.NET build + test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: |
          dotnet restore ./SellBotLk.Api/SellBotLk.Api.csproj
          dotnet restore ./SellBotLk.Tests/SellBotLk.Tests.csproj

      - name: Build
        run: dotnet build ./SellBotLk.Api/SellBotLk.Api.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test ./SellBotLk.Tests/SellBotLk.Tests.csproj --configuration Release
